<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול נדל"ן - תפריט אפשרויות</title>
    <style>
        :root {
            --monday-blue: #0073ea;
            --monday-bg: #f5f6f8;
            --border-color: #d0d4e4;
            --text-color: #323338;
        }
        body { font-family: "Figtree", sans-serif; background-color: var(--monday-bg); margin: 0; padding: 20px; color: var(--text-color); }
        .container { max-width: 1100px; margin: auto; }
        
        .dept-section { background: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 30px; position: relative; }
        .dept-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 13px; color: #676879; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f1f1; font-size: 14px; position: relative; }

        /* כפתור 3 נקודות ותפריט */
        .menu-container { position: relative; display: inline-block; }
        .dots-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #676879; padding: 5px; }
        .dots-btn:hover { background: #eee; border-radius: 4px; }
        
        .dropdown-menu { 
            display: none; position: absolute; left: 0; top: 100%; 
            background: white; border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 4px; 
            z-index: 100; min-width: 120px;
        }
        .dropdown-menu button { 
            display: block; width: 100%; text-align: right; padding: 10px; 
            border: none; background: none; font-size: 13px; cursor: pointer; 
        }
        .dropdown-menu button:hover { background: #f0f0f0; }
        .show { display: block; }

        .add-btn { background: var(--monday-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .status-btn { border: none; color: white; padding: 6px; width: 90px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>ניהול פרויקטים נדל"ן 🏗️</h1>
        <button class="add-btn" onclick="addItem('dept')">+ מחלקה חדשה</button>
    </div>
    <div id="app"></div>
</div>

<script>
    let officeData = JSON.parse(localStorage.getItem('proData')) || [];

    function saveData() { localStorage.setItem('proData', JSON.stringify(officeData)); }

    function addItem(type, p1, p2) {
        let name = prompt(`הכנס שם ל${type}:`);
        if(!name) return;
        if(type === 'dept') officeData.push({name: name, projects: []});
        else if(type === 'proj') officeData[p1].projects.push({name: name, tasks: []});
        else if(type === 'task') officeData[p1].projects[p2].tasks.push({name: name, status: "חדש"});
        saveData(); render();
    }

    function toggleMenu(id) {
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            if(m.id !== id) m.classList.remove('show');
        });
        document.getElementById(id).classList.toggle('show');
    }

    function editItem(type, p1, p2, p3) {
        let currentName = "";
        if(type === 'dept') currentName = officeData[p1].name;
        else if(type === 'proj') currentName = officeData[p1].projects[p2].name;
        else if(type === 'task') currentName = officeData[p1].projects[p2].tasks[p3].name;

        let newName = prompt("ערוך שם:", currentName);
        if(!newName) return;

        if(type === 'dept') officeData[p1].name = newName;
        else if(type === 'proj') officeData[p1].projects[p2].name = newName;
        else if(type === 'task') officeData[p1].projects[p2].tasks[p3].name = newName;
        
        saveData(); render();
    }

    function deleteItem(type, p1, p2, p3) {
        if(!confirm("למחוק לצמיתות?")) return;
        if(type === 'dept') officeData.splice(p1, 1);
        else if(type === 'proj') officeData[p1].projects.splice(p2, 1);
        else if(type === 'task') officeData[p1].projects[p2].tasks.splice(p3, 1);
        saveData(); render();
    }

    function moveItem() { alert("פונקציית העברה תתווסף בגרסה הבאה!"); }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = "";

        officeData.forEach((dept, di) => {
            let dDiv = document.createElement('div');
            dDiv.className = 'dept-section';
            dDiv.innerHTML = `
                <div class="dept-header">
                    <h2>🏢 ${dept.name}</h2>
                    <div class="menu-container">
                        <button class="add-btn" onclick="addItem('proj', ${di})">+ פרויקט</button>
                        <button class="dots-btn" onclick="toggleMenu('m-dept-${di}')">⋮</button>
                        <div id="m-dept-${di}" class="dropdown-menu">
                            <button onclick="editItem('dept', ${di})">✏️ עריכה</button>
                            <button onclick="moveItem()">➡️ העברה</button>
                            <button onclick="deleteItem('dept', ${di})" style="color:red">🗑️ מחיקה</button>
                        </div>
                    </div>
                </div>`;
            
            dept.projects.forEach((proj, pi) => {
                let pTable = document.createElement('div');
                pTable.style.padding = "10px";
                let html = `
                    <div style="display:flex; justify-content:space-between; background:#f8f9fb; padding:10px;">
                        <strong>📊 ${proj.name}</strong>
                        <div class="menu-container">
                            <button class="dots-btn" onclick="toggleMenu('m-proj-${di}-${pi}')">⋮</button>
                            <div id="m-proj-${di}-${pi}" class="dropdown-menu">
                                <button onclick="editItem('proj', ${di}, ${pi})">✏️ עריכה</button>
                                <button onclick="moveItem()">➡️ העברה</button>
                                <button onclick="deleteItem('proj', ${di}, ${pi})" style="color:red">🗑️ מחיקה</button>
                            </div>
                        </div>
                    </div>
                    <table><tbody>`;
                
                proj.tasks.forEach((task, ti) => {
                    html += `<tr>
                        <td style="width:30px">
                            <div class="menu-container">
                                <button class="dots-btn" onclick="toggleMenu('m-task-${di}-${pi}-${ti}')">⋮</button>
                                <div id="m-task-${di}-${pi}-${ti}" class="dropdown-menu">
                                    <button onclick="editItem('task', ${di}, ${pi}, ${ti})">✏️ עריכה</button>
                                    <button onclick="moveItem()">➡️ העברה</button>
                                    <button onclick="deleteItem('task', ${di}, ${pi}, ${ti})" style="color:red">🗑️
