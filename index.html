<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול דמויית Monday</title>
    <style>
        :root {
            --monday-blue: #0073ea;
            --monday-bg: #f5f6f8;
            --done-green: #00c875;
            --working-orange: #fdab3d;
            --stuck-red: #e44258;
            --border-color: #d0d4e4;
        }
        body { font-family: "Figtree", sans-serif; background-color: var(--monday-bg); margin: 0; padding: 20px; color: #323338; }
        .container { max-width: 1100px; margin: auto; }
        h1 { color: #323338; font-size: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        
        /* עיצוב מחלקות ופרויקטים */
        .dept-section { background: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 30px; overflow: hidden; }
        .dept-header { background: #fff; padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .project-group { margin: 15px; border: 1px solid var(--border-color); border-radius: 4px; }
        .project-title { background: #f8f9fb; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        
        /* טבלת משימות בסגנון מאנדיי */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { text-align: right; padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 13px; color: #676879; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        
        /* כפתורי סטטוס */
        .status-btn { border: none; color: white; padding: 8px; width: 100px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; }
        .status-default { background: #c4c4c4; }
        .status-done { background: var(--done-green); }
        .status-working { background: var(--working-orange); }
        .status-stuck { background: var(--stuck-red); }

        /* כפתורים כלליים */
        button { cursor: pointer; transition: opacity 0.2s; }
        .add-btn { background: var(--monday-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-size: 13px; }
        .del-btn { background: none; border: none; color: #676879; font-size: 16px; margin-right: 10px; }
        .del-btn:hover { color: var(--stuck-red); }

        .add-row-btn { color: var(--monday-blue); background: none; border: 1px dashed var(--monday-blue); width: 100%; padding: 8px; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h1>לוח עבודה נדל"ן - Monday Style 🏗️</h1>
        <button class="add-btn" onclick="addItem('dept')">+ מחלקה חדשה</button>
    </div>

    <div id="app"></div>
</div>

<script>
    let officeData = JSON.parse(localStorage.getItem('mondayData')) || [];

    const statusMap = {
        "חדש": "status-default",
        "בוצע": "status-done",
        "בתהליך": "status-working",
        "תקוע": "status-stuck"
    };

    function saveData() { localStorage.setItem('mondayData', JSON.stringify(officeData)); }

    function addItem(type, p1, p2, p3) {
        let name = prompt(`הכנס שם ל${type}:`);
        if(!name) return;

        if(type === 'dept') officeData.push({name: name, projects: []});
        else if(type === 'proj') officeData[p1].projects.push({name: name, tasks: []});
        else if(type === 'task') officeData[p1].projects[p2].tasks.push({name: name, status: "חדש"});
        
        saveData(); render();
    }

    function toggleStatus(di, pi, ti) {
        const states = ["חדש", "בתהליך", "תקוע", "בוצע"];
        let current = officeData[di].projects[pi].tasks[ti].status;
        let next = states[(states.indexOf(current) + 1) % states.length];
        officeData[di].projects[pi].tasks[ti].status = next;
        saveData(); render();
    }

    function deleteItem(type, p1, p2, p3) {
        if(!confirm("למחוק?")) return;
        if(type === 'dept') officeData.splice(p1, 1);
        else if(type === 'proj') officeData[p1].projects.splice(p2, 1);
        else if(type === 'task') officeData[p1].projects[p2].tasks.splice(p3, 1);
        saveData(); render();
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = "";

        officeData.forEach((dept, di) => {
            let dDiv = document.createElement('div');
            dDiv.className = 'dept-section';
            dDiv.innerHTML = `<div class="dept-header"><h2>🏢 ${dept.name}</h2>
                <div><button class="add-btn" onclick="addItem('proj', ${di})">+ פרויקט</button>
                <button class="del-btn" onclick="deleteItem('dept', ${di})">🗑️</button></div></div>`;
            
            dept.projects.forEach((proj, pi) => {
                let pDiv = document.createElement('div');
                pDiv.className = 'project-group';
                let tableHtml = `
                    <div class="project-title"><span>📊 ${proj.name}</span> <button class="del-btn" onclick="deleteItem('proj', ${di}, ${pi})">🗑️</button></div>
                    <table>
                        <thead><tr><th style="width:20px"></th><th>משימה</th><th style="width:120px">סטטוס</th></tr></thead>
                        <tbody>`;
                
                proj.tasks.forEach((task, ti) => {
                    tableHtml += `
                        <tr>
                            <td><button class="del-btn" style="font-size:12px" onclick="deleteItem('task', ${di}, ${pi}, ${ti})">✕</button></td>
                            <td>${task.name}</td>
                            <td><button class="status-btn ${statusMap[task.status]}" onclick="toggleStatus(${di}, ${pi}, ${ti})">${task.status}</button></td>
                        </tr>`;
                });
                
                tableHtml += `</tbody></table>
                    <button class="add-row-btn" onclick="addItem('task', ${di}, ${pi})">+ הוסף משימה</button>`;
                pDiv.innerHTML = tableHtml;
                dDiv.appendChild(pDiv);
            });
            app.appendChild(dDiv);
        });
    }
    render();
</script>
</body>
</html>
