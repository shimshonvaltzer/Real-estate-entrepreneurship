<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday Pro Clone - Real Estate</title>
    <style>
        :root {
            --bg: #f5f6f8; --text: #323338; --blue: #0073ea; --border: #d0d4e4;
            --st-new: #c4c4c4; --st-working: #fdab3d; --st-stuck: #e44258; --st-done: #00c875;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-primary { background: var(--blue); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }

        .group-container { background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 30px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .group-header { padding: 15px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fb; padding: 10px; text-align: right; font-size: 13px; color: #676879; border-bottom: 1px solid var(--border); border-left: 1px solid #eee; }
        td { padding: 0; border-bottom: 1px solid #f1f1f1; border-left: 1px solid #f1f1f1; height: 40px; }
        
        .cell-input { width: 100%; border: none; padding: 10px; box-sizing: border-box; outline: none; background: transparent; }
        .cell-input:focus { background: #e5f3ff; }

        .status-select { width: 100%; height: 100%; border: none; color: white; font-weight: bold; text-align: center; cursor: pointer; appearance: none; text-align-last: center; }
        .st-new { background: var(--st-new); }
        .st-working { background: var(--st-working); }
        .st-stuck { background: var(--st-stuck); }
        .st-done { background: var(--st-done); }

        .menu-dots { cursor: pointer; padding: 5px 10px; color: #676879; }
        .menu-dots:hover { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="board-header">
        <h1>לוח ניהול נדל"ן 🏗️</h1>
        <button class="btn-primary" onclick="addGroup()">+ הוסף קבוצה (מחלקה)</button>
    </div>
    <div id="board"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('monday_pro_db')) || [];

    function save() { localStorage.setItem('monday_pro_db', JSON.stringify(data)); }

    function addGroup() {
        data.push({ id: Date.now(), name: "קבוצה חדשה", tasks: [] });
        save(); render();
    }

    function addTask(groupId) {
        const group = data.find(g => g.id === groupId);
        group.tasks.push({ id: Date.now(), name: "", owner: "", status: "חדש", date: "" });
        save(); render();
    }

    function updateTask(groupId, taskId, field, value) {
        const group = data.find(g => g.id === groupId);
        const task = group.tasks.find(t => t.id === taskId);
        task[field] = value;
        save();
    }

    function deleteGroup(id) { if(confirm("למחוק קבוצה?")) { data = data.filter(g => g.id !== id); save(); render(); } }
    function deleteTask(groupId, taskId) { 
        const group = data.find(g => g.id === groupId);
        group.tasks = group.tasks.filter(t => t.id !== taskId);
        save(); render();
    }

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = "";

        data.forEach(group => {
            const gDiv = document.createElement('div');
            gDiv.className = 'group-container';
            gDiv.innerHTML = `
                <div class="group-header">
                    <span class="menu-dots" onclick="deleteGroup(${group.id})">🗑️</span>
                    <input class="cell-input" style="font-weight:bold; font-size:18px" value="${group.name}" onchange="group.name=this.value; save()">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px"></th>
                            <th>שם המשימה</th>
                            <th style="width:150px">איש צוות</th>
                            <th style="width:140px">סטטוס</th>
                            <th style="width:150px">תאריך יעד</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-${group.id}"></tbody>
                </table>
                <button class="cell-input" style="color:var(--blue); text-align:right; cursor:pointer" onclick="addTask(${group.id})">+ הוסף משימה</button>
            `;
            board.appendChild(gDiv);

            const tbody = document.getElementById(`tasks-${group.id}`);
            group.tasks.forEach(task => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="menu-dots" onclick="deleteTask(${group.id}, ${task.id})">✕</td>
                    <td><input class="cell-input" value="${task.name}" onchange="updateTask(${group.id}, ${task.id}, 'name', this.value)" placeholder="כתוב משימה..."></td>
                    <td><input class="cell-input" value="${task.owner}" onchange="updateTask(${group.id}, ${task.id}, 'owner', this.value)" placeholder="מי האחראי?"></td>
                    <td>
                        <select class="status-select ${getStatusClass(task.status)}" onchange="updateTask(${group.id}, ${task.id}, 'status', this.value); render()">
                            <option value="חדש" ${task.status==='חדש'?'selected':''}>חדש</option>
                            <option value="בתהליך" ${task.status==='בתהליך'?'selected':''}>בתהליך</option>
                            <option value="תקוע" ${task.status==='תקוע'?'selected':''}>תקוע</option>
                            <option value="בוצע" ${task.status==='בוצע'?'selected':''}>בוצע</option>
                        </select>
                    </td>
                    <td><input type="date" class="cell-input" value="${task.date}" onchange="updateTask(${group.id}, ${task.id}, 'date', this.value)"></td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    function getStatusClass(s) {
        if(s==='חדש') return 'st-new';
        if(s==='בתהליך') return 'st-working';
        if(s==='תקוע') return 'st-stuck';
        if(s==='בוצע') return 'st-done';
    }

    render();
</script>
</body>
</html>
