<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול משרד נדל"ן</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; line-height: 1.6; }
        .controls { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; margin-left: 10px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        .department { background: #fff; margin-bottom: 20px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #007bff; }
        .project { margin-right: 25px; border-right: 2px solid #6c757d; padding-right: 15px; margin-top: 10px; }
        .stage { margin-right: 25px; color: #555; background: #f9f9f9; padding: 5px; }
        .task { margin-right: 25px; color: #333; list-style-type: square; }
        h2 { margin-top: 0; color: #007bff; }
    </style>
</head>
<body>

    <h1>מערכת ניהול נדל"ן 🏗️</h1>

    <div class="controls">
        <input type="text" id="deptInput" placeholder="הכנס שם מחלקה חדשה...">
        <button onclick="addNewDept()">הוסף מחלקה +</button>
    </div>

    <div id="app"></div>

    <script>
        // נתונים התחלתיים
        let officeData = [
            {
                name: "מחלקת שיווק",
                projects: [
                    {
                        name: "פרויקט נופי העיר",
                        stages: [{ name: "תכנון", tasks: ["הכנת מצגת", "סיור שטח"] }]
                    }
                ]
            }
        ];

        // פונקציה שמוסיפה מחלקה חדשה לרשימה
        function addNewDept() {
            const input = document.getElementById('deptInput');
            const name = input.value;
            
            if (name.trim() !== "") {
                officeData.push({ name: name, projects: [] });
                input.value = ""; // מנקה את התיבה
                renderApp();      // מעדכן את התצוגה
            }
        }

        // פונקציה שמציגה הכל על המסך
        function renderApp() {
            const container = document.getElementById('app');
            container.innerHTML = ""; // ניקוי המסך לפני ציור מחדש

            officeData.forEach(dept => {
                let html = `<div class="department"><h2>🏢 ${dept.name}</h2>`;
                dept.projects.forEach(proj => {
                    html += `<div class="project"><h3>📊 ${proj.name}</h3>`;
                    proj.stages.forEach(stage => {
                        html += `<div class="stage"><h4>📅 ${stage.name}</h4><ul>`;
                        stage.tasks.forEach(task => {
                            html += `<li class="task">${task}</li>`;
                        });
                        html += `</ul></div>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        renderApp();
    </script>
</body>
</html>
